name: Prism Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: C:\cargo

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-2022

    steps:
      - name: Enable Windows long paths
        shell: pwsh
        run: |
          reg add "HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f
          git config --system core.longpaths true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-windows-x86_64

      - name: Build prism
        run: cargo build --release -p zed --bin prism

      - name: Package release archive
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          $bundleDir = "dist/prism-$version-windows-x86_64"
          New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null
          Copy-Item "target/release/prism.exe" "$bundleDir/"
          Copy-Item "README.md","LICENSE-GPL","LICENSE-APACHE","LICENSE-AGPL" $bundleDir
          Compress-Archive -Path "$bundleDir/*" -DestinationPath "dist/prism-$version-windows-x86_64.zip" -Force

      - name: Upload Windows archive
        uses: actions/upload-artifact@v4
        with:
          name: prism-windows-x86_64
          path: dist/*.zip

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/*
